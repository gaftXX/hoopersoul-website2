name: CI
on: [push, pull_request]

# Dawn's upstream workflow posts GitHub Checks and runs Lighthouse against Shopify's
# internal demo store. Forks/merchant repos need explicit permissions and optional Lighthouse.
permissions:
  contents: read
  checks: write

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Shopify CLI
        run: npm install --no-package-lock --no-save @shopify/cli@latest
      - name: Theme Check
        run: npx shopify theme check --fail-level error

  # Optional: enable in repo Settings → Secrets and variables → Actions → Variables:
  #   ENABLE_SHOPIFY_LIGHTHOUSE = true
  # And add secrets: SHOP_STORE_OS2, SHOP_PASSWORD_OS2, SHOP_ACCESS_TOKEN, etc.
  lhci:
    name: Lighthouse
    runs-on: ubuntu-latest
    if: vars.ENABLE_SHOPIFY_LIGHTHOUSE == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Lighthouse
        uses: shopify/lighthouse-ci-action@v1
        with:
          store: ${{ secrets.SHOP_STORE_OS2 }}
          password: ${{ secrets.SHOP_PASSWORD_OS2 }}
          access_token: ${{ secrets.SHOP_ACCESS_TOKEN }}
          collection_handle: all
          lhci_github_app_token: ${{ secrets.LHCI_GITHUB_TOKEN }}
          pull_theme: ${{ secrets.SHOP_PULL_THEME }}
